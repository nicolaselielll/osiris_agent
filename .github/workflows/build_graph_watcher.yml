name: Build graph_watcher binaries

on:
  workflow_dispatch:   # run manually from the Actions tab
  push:
    paths:
      - 'graph_watcher/**'   # auto-run when source changes

permissions:
  contents: write

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Build graph_watcher (x86_64)
        run: |
          source /opt/ros/humble/setup.bash
          BUILD_DIR=$(mktemp -d)
          cmake -S graph_watcher -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$BUILD_DIR" --parallel
          cp "$BUILD_DIR/graph_watcher" osiris_agent/bin/graph_watcher_x86_64
          chmod +x osiris_agent/bin/graph_watcher_x86_64
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: graph_watcher_x86_64
          path: osiris_agent/bin/graph_watcher_x86_64

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build graph_watcher (aarch64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$PWD/graph_watcher":/ws/src/graph_watcher:ro \
            -v "$PWD/osiris_agent/bin":/out \
            ros:humble-ros-base \
            bash -c '
              set -e
              source /opt/ros/humble/setup.bash
              cd /ws
              colcon build --packages-select graph_watcher \
                --cmake-args -DCMAKE_BUILD_TYPE=Release
              cp install/graph_watcher/lib/graph_watcher/graph_watcher /out/graph_watcher_aarch64
              chmod +x /out/graph_watcher_aarch64
            '

      - uses: actions/upload-artifact@v4
        with:
          name: graph_watcher_aarch64
          path: osiris_agent/bin/graph_watcher_aarch64

  commit-binaries:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          name: graph_watcher_x86_64
          path: osiris_agent/bin/

      - uses: actions/download-artifact@v4
        with:
          name: graph_watcher_aarch64
          path: osiris_agent/bin/

      - name: Commit updated binaries
        run: |
          chmod +x osiris_agent/bin/graph_watcher_x86_64
          chmod +x osiris_agent/bin/graph_watcher_aarch64
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add osiris_agent/bin/graph_watcher_x86_64 \
                  osiris_agent/bin/graph_watcher_aarch64
          git diff --staged --quiet || \
            git commit -m "build: update graph_watcher binaries [skip ci]"
          git push
